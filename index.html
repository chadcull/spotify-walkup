<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ballpark Music Manager</title>

<style>
body { font-family: Arial, sans-serif; margin:0; padding:16px; background:#f4f4f4; }
h1 { text-align:center; }

button {
  font-size:14px;
  padding:6px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.controls {
  position:sticky;
  top:0;
  background:white;
  padding:12px;
  margin-bottom:12px;
  border-radius:10px;
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:center;
}

.login-btn { background:#1DB954; color:white; width:48%; }
.fade-btn { background:#f0ad4e; color:white; }
.stop-btn { background:#d9534f; color:white; }
.test-btn { background:#9999ee; }

.status-icon {
  font-size:12px;
  padding:6px 10px;
  background:#eee;
  border-radius:8px;
}

.tabs {
  display:flex;
  gap:8px;
  margin-bottom:12px;
}

.tab-btn {
  flex:1;
  background:#ddd;
}

.tab-btn.active {
  background:#333;
  color:white;
}

.section { display:none; }
.section.active { display:block; }

.player {
  background:white;
  padding:12px;
  margin-bottom:8px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.play-btn {
  background:#28a745;
  color:white;
}

textarea {
  width:100%;
  min-height:120px;
  font-family:monospace;
  margin-bottom:8px;
}

.hiddenPanel { display:none; }

.card {
  background:white;
  padding:10px;
  margin-bottom:8px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
</style>
</head>

<body>

<h1>⚾ Ballpark Music</h1>

<div class="controls">
  <button class="login-btn" onclick="loginSpotify()">Login</button>
  <button class="fade-btn" onclick="fadeOut()">Fade</button>
  <button class="stop-btn" onclick="stopAll()">Stop</button>
  <button class="test-btn" onclick="playTestSound()">Test</button>

  <span id="wifi" class="status-icon">WiFi</span>
  <span id="spotify" class="status-icon">Spotify</span>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="setTab('team')">Our Team</button>
  <button class="tab-btn" onclick="setTab('opp')">Opponents</button>
  <button class="tab-btn" onclick="setTab('music')">Extra Music</button>
</div>

<!-- TEAM -->
<div id="team" class="section active">
  <button onclick="togglePanel('teamPanel')">Reset Data</button>
  <div id="teamPanel" class="hiddenPanel">
    <textarea id="teamJson"></textarea>
    <button onclick="loadTeam()">Load Team</button>
  </div>
  <div id="teamRoster"></div>
</div>

<!-- OPPONENTS -->
<div id="opp" class="section">
  <button onclick="togglePanel('oppPanel')">Reset Data</button>
  <div id="oppPanel" class="hiddenPanel">
    <textarea id="oppJson"></textarea>
    <button onclick="loadOpp()">Load Opponents</button>
  </div>
  <div id="oppRoster"></div>
</div>

<!-- MUSIC -->
<div id="music" class="section">

  <h3>Between Innings</h3>
  <button onclick="playRandomSong()">Play a Song</button>

  <h3>Sound Effects</h3>
  <div id="clips"></div>

  <textarea id="clipsJson"></textarea>
  <button onclick="loadClips()">Load Clips</button>

</div>

<script>

let accessToken=null, deviceId=null, spotifyPlayer=null;
let fadeTimer=null, clipTimer=null;

let ourRoster=[], oppRoster=[], clips=[];

let activeTab='team';

function setTab(t){
  activeTab=t;
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(t).classList.add('active');

  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}

function togglePanel(id){
  const el=document.getElementById(id);
  el.style.display = el.style.display==='block'?'none':'block';
}

/* ---------- PLAYBACK CORE ---------- */

function stopAll(){
  if(fadeTimer) clearInterval(fadeTimer);
  if(clipTimer) clearTimeout(clipTimer);
  if(spotifyPlayer) spotifyPlayer.pause();
}

function fadeOut(){
  if(!spotifyPlayer) return;
  let v=1;
  if(fadeTimer) clearInterval(fadeTimer);

  fadeTimer=setInterval(()=>{
    v-=0.05;
    if(v<=0){
      stopAll();
      return;
    }
    spotifyPlayer.setVolume(v);
  },100);
}

/* ---------- BETWEEN INNINGS ---------- */

function playRandomSong(){
  stopAll();

  const songs = JSON.parse(localStorage.getItem('songs')||'[]');
  if(!songs.length) return;

  const song = songs[Math.floor(Math.random()*songs.length)];

  spotifyPlayer._options.getOAuthToken(token=>{
    accessToken=token;
  });

  fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`,{
    method:'PUT',
    headers:{
      Authorization:`Bearer ${accessToken}`,
      'Content-Type':'application/json'
    },
    body:JSON.stringify({uris:[song.uri]})
  });

  setTimeout(()=>spotifyPlayer.seek(song.startMs||0),500);
}

/* ---------- CLIPS ---------- */

function loadClips(){
  clips = JSON.parse(document.getElementById('clipsJson').value);
  renderClips();
}

function renderClips(){
  const c=document.getElementById('clips');
  c.innerHTML='';

  clips.forEach((clip,i)=>{
    const div=document.createElement('div');
    div.className='card';

    div.innerHTML=`
      <div>${clip.name}</div>
      <button>▶</button>
    `;

    div.querySelector('button').onclick=()=>{
      playClip(clip);
    };

    c.appendChild(div);
  });
}

function playClip(clip){
  stopAll();

  fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`,{
    method:'PUT',
    headers:{
      Authorization:`Bearer ${accessToken}`,
      'Content-Type':'application/json'
    },
    body:JSON.stringify({uris:[clip.uri]})
  });

  setTimeout(()=>{
    spotifyPlayer.seek(clip.startMs||0);

    const duration = (clip.endMs - clip.startMs) - 2000;

    clipTimer=setTimeout(()=>{
      fadeOut();
    }, duration);

  },500);
}

/* ---------- TEAM / OPPONENTS ---------- */

function renderRoster(roster, container){
  const c=document.getElementById(container);
  c.innerHTML='';

  roster.forEach((p,i)=>{
    const div=document.createElement('div');
    div.className='player';

    div.innerHTML=`
      <div>${p.name} (#${p.number})</div>
      <button class="play-btn">Play</button>
    `;

    div.querySelector('button').onclick=()=>{
      playSong(p);
    };

    c.appendChild(div);
  });
}

function playSong(p){
  stopAll();

  fetch(`https://api.spotify.com/v1/me/player/play?device_id=${deviceId}`,{
    method:'PUT',
    headers:{
      Authorization:`Bearer ${accessToken}`,
      'Content-Type':'application/json'
    },
    body:JSON.stringify({uris:[p.uri]})
  });

  setTimeout(()=>spotifyPlayer.seek(p.startMs||0),500);
}

/* ---------- LOADERS ---------- */

function loadTeam(){
  ourRoster=JSON.parse(document.getElementById('teamJson').value);
  localStorage.setItem('team',JSON.stringify(ourRoster));
  renderRoster(ourRoster,'teamRoster');
}

function loadOpp(){
  oppRoster=JSON.parse(document.getElementById('oppJson').value);
  localStorage.setItem('opp',JSON.stringify(oppRoster));
  renderRoster(oppRoster,'oppRoster');
}

function loadSaved(){
  ourRoster=JSON.parse(localStorage.getItem('team')||'[]');
  oppRoster=JSON.parse(localStorage.getItem('opp')||'[]');
}

/* ---------- INIT ---------- */

loadSaved();

/* Spotify init placeholder */
window.onSpotifyWebPlaybackSDKReady=()=>{
  spotifyPlayer=new Spotify.Player({
    name:'Ballpark',
    getOAuthToken:cb=>cb(accessToken),
    volume:1
  });

  spotifyPlayer.addListener('ready',({device_id})=>{
    deviceId=device_id;
  });

  spotifyPlayer.connect();
};

</script>

<script src="https://sdk.scdn.co/spotify-player.js"></script>
</body>
</html>
